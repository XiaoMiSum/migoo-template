server:
  port: 48080

spring:
  application:
    name: template-server
  lifecycle:
    timeout-per-shutdown-phase: 60s
  # Jackson 配置项
  jackson:
    serialization:
      write-dates-as-timestamps: true # 设置 Date 的格式，使用时间戳
      write-date-timestamps-as-nanoseconds: false # 设置不使用 nanoseconds 的格式。例如说 1611460870.401，而是直接 1611460870401
      write-durations-as-timestamps: true # 设置 Duration 的格式，使用时间戳
      fail-on-empty-beans: false # 允许序列化无属性的 Bean
  # 数据源配置项
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid: # Druid
      url: jdbc:mysql://127.0.0.1:3306/db-template?useSSL=false&tinyInt1isBit=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
      username: root
      password: 123456qq
      web-stat-filter: #【监控】相关的全局配置
        enabled: true
      stat-view-servlet:
        enabled: true
        allow: # 设置白名单，不填则允许所有访问
        url-pattern: ${migoo.web.api-prefix}/druid/*
        login-username: # 控制台管理用户名和密码
        login-password:
      filter:
        stat:
          enabled: true
          log-slow-sql: true # 慢 SQL 记录
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
  redis:
    host: localhost
    port: 6379

#################### 框架相关配置 ####################

migoo:
  web:
    api-prefix: /${spring.application.name}
    controller-package: xyz.migoo.template.controller
    scan-all: true
  xss:
    enable: false
  mybatis:
    mapper-package: xyz.migoo.template.dal.mysql
  security:
    token-header: X-Token
    token-secret: 17c553e34228909b1f8cef6d1de0b53d
    token-timeout: 1d
    session-timeout: 30m
  generator:
    base-package: xyz.migoo.template

# MyBatis Plus 的配置项
mybatis-plus:
  #  在 mybatis-config/mybatis-config.xml 中设置
  configuration:
    map-underscore-to-camel-case: true # 虽然默认为 true ，但是还是显示去指定下。
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印日志
    lazy-loading-enabled: false
  global-config:
    db-config:
      id-type: AUTO # 自增 ID
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)
  mapper-locations: classpath*:mapper/*.xml
  configuration-properties:
    prefix: ""
    wildcardEscapeClause: ""
    limitBefore: ""
    limitAfter: "LIMIT #{maxResults} OFFSET #{firstResult}"
    limitBetween: ""
    limitOuterJoinBetween: ""
    limitBeforeNativeQuery: ""
    orderBy: "order by ${orderByColumns}"
    blobType: "BLOB"
    boolValue: "TRUE"
  #  type-aliases-package:

---  #################### 监控相关配置 ####################

# Actuator 监控端点的配置项
management:
  server: # 开启仅允许127.0.0.1访问
    address: 127.0.0.1
    port: 58080
  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true
  endpoints:
    web:
      base-path: ${migoo.web.api-prefix}/actuator # Actuator 提供的 API 接口的根目录。默认为 /actuator
      exposure:
        # 需要排除的端点
        exclude: 'env,beans,configprops'
        # 需要开放的端点。默认值只打开 health 和 info 两个端点。通过设置 * ，可以开放所有端点。
        include: '*'
# Spring Boot Admin 配置项
spring:
  boot:
    admin:
      # Spring Boot Admin Client 客户端的相关配置
      client:
        url: http://127.0.0.1:${server.port}${spring.boot.admin.context-path} # 设置 Spring Boot Admin Server 地址
        instance:
          prefer-ip: true # 注册实例时，优先使用 IP
      # Spring Boot Admin Server 服务端的相关配置
      context-path: ${migoo.web.api-prefix}/actuator-admin # 配置 Spring

# 日志文件配置
logging:
  file:
    name: ${user.dir}/logs/${spring.application.name}.log # 日志文件名，全路径
